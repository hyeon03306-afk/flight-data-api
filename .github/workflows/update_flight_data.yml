name: Update Flight Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 시스템 Git 도구로 직접 소스 코드 받아오기
      run: |
        git clone https://github.com/${{ github.repository }}.git .
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: 2. 파이썬 및 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 3. 비행기 데이터 수집 스크립트 실행
      env:
        OPENAPI_KEY: ${{ secrets.OPENAPI_KEY }}
      run: python flight_test.py

    - name: 4. 변경된 JSON 파일 깃허브에 자동 커밋 & 푸시
      run: |
        git add flight_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update flight data" && git push)
