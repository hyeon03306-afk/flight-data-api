name: Update Flight Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    
    # 혹시 모를 권한 누락을 방지하기 위해 파일에도 직접 쓰기 권한을 명시합니다.
    permissions:
      contents: write

    steps:
    # 1. 수동 git clone 대신 공식 Checkout 액션을 사용하여 인증 문제 해결
    - name: 1. 소스 코드 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 1-1. Git 사용자 정보 설정
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: 2. 파이썬 및 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 3. 비행기 데이터 수집 스크립트 실행
      env:
        OPENAPI_KEY: ${{ secrets.OPENAPI_KEY }}
      run: python flight_test.py

    - name: 4. 변경된 JSON 파일 깃허브에 자동 커밋 & 푸시
      run: |
        git add flight_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update flight data" && git push)
